<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex, nofollow">
  <meta name="description" content="BLACKVOX — coming soon.">
  <title>BLACKVOX</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { height: 100%; }
    body {
      background: #000;
      color: #fff;
      font-family: -apple-system, "Segoe UI", "Hiragino Kaku Gothic ProN", "Yu Gothic", sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      text-align: center;
      letter-spacing: 0.02em;
      padding: 24px;
    }
    .wordmark {
      font-size: clamp(28px, 7vw, 56px);
      font-weight: 500;
      letter-spacing: 0.35em;
      text-indent: 0.35em;
      margin-bottom: 28px;
    }
    .status {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      font-size: 13px;
      letter-spacing: 0.15em;
      color: #a1a1aa;
      text-transform: uppercase;
    }
    .dot {
      width: 7px; height: 7px; border-radius: 50%;
      background: #4f9cff;
      box-shadow: 0 0 10px #4f9cff;
      animation: pulse 1.8s ease-in-out infinite;
    }
    @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.25; } }
    .sub {
      margin-top: 18px;
      font-size: 13px;
      color: #6b6b74;
      line-height: 1.9;
    }
    .sub a { color: #a1a1aa; text-decoration: none; border-bottom: 1px solid #3a3a3a; }
    .sub a:hover { color: #fff; }
  </style>
</head>
<body>
  <div class="wordmark">BLACKVOX</div>
  <div class="status"><span class="dot"></span>Coming soon</div>
  <p class="sub">
    新しいかたちで準備しています。<br>
    お問い合わせ： <a href="mailto:contact@blackvox.co">contact@blackvox.co</a>
  </p>
</body>
</html>
